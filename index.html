<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Alwan Quote Pro</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#172230;--muted:#667085;--line:#e4e7ec;--brand:#16324f;--soft:#eef2f6;--ok:#137a4b;--danger:#c0392b}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.header{position:sticky;top:0;z-index:50;background:rgba(244,247,251,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.wrap{max-width:1180px;margin:0 auto;padding:14px}
.brand{display:flex;gap:12px;align-items:center} .brand img{width:58px;height:58px;border-radius:14px;border:1px solid var(--line);background:#fff}
.brand h1{margin:0;font-size:24px} .brand p{margin:3px 0 0;color:var(--muted);font-size:13px}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;margin-top:14px;box-shadow:0 10px 26px rgba(16,24,40,.04)}
.row{display:grid;gap:12px} .grid-2{grid-template-columns:1.15fr .85fr} .grid-4{grid-template-columns:repeat(4,1fr)}
@media (max-width:900px){.grid-2,.grid-4{grid-template-columns:1fr}}
h2{margin:0 0 12px;font-size:22px}
label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px}
input,select,textarea,button{font:inherit} input,select,textarea{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink)}
textarea{min-height:96px;resize:vertical}
.toolbar{display:flex;flex-wrap:wrap;gap:10px}
button{border:0;border-radius:14px;padding:12px 16px;background:var(--brand);color:#fff;font-weight:800}
button.secondary{background:#fff;color:var(--brand);border:1px solid var(--line)} button.ghost{background:var(--soft);color:var(--ink)} button.ok{background:var(--ok)} button.danger{background:var(--danger)}
.notice{margin-top:12px;padding:11px 13px;border-radius:12px;border:1px solid #f0d596;background:#fff8e8;color:#8a5a00;font-size:14px}
.category-chips{display:flex;flex-wrap:wrap;gap:10px} .chip{padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-weight:700;cursor:pointer}
.chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
.tile{border:1px solid var(--line);border-radius:18px;padding:10px;background:#fff;cursor:pointer;transition:.15s transform,.15s border-color,.15s box-shadow}
.tile.active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(22,50,79,.08)} .tile:hover{transform:translateY(-1px)}
.tile img{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:13px;border:1px solid var(--line);background:#f5f5f5}
.tile .t1{margin-top:8px;font-size:13px;font-weight:800;line-height:1.25;min-height:34px} .tile .t2{margin-top:4px;font-size:12px;color:var(--muted)}
.quickrate{display:grid;grid-template-columns:repeat(4,1fr);gap:10px} @media (max-width:900px){.quickrate{grid-template-columns:repeat(2,1fr)}}
.kbox{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px} .kbox .n{font-size:24px;font-weight:800} .kbox .s{font-size:12px;color:var(--muted);margin-top:4px}
.checks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px} @media (max-width:900px){.checks{grid-template-columns:repeat(2,1fr)}}
.chk{display:flex;gap:8px;align-items:center;padding:10px 12px;background:#fff;border:1px solid var(--line);border-radius:12px} .chk input{width:auto}
.items{display:grid;gap:10px}
.item{display:grid;grid-template-columns:92px 1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:18px;padding:10px;background:#fff}
.item img{width:92px;height:116px;object-fit:cover;border-radius:13px;border:1px solid var(--line);background:#f5f5f5}
.item .title{font-weight:800} .item .meta{margin-top:4px;font-size:13px;color:var(--muted)} .item .amt{font-size:19px;font-weight:900;text-align:right}
.small{font-size:12px;color:var(--muted)} .hidden{display:none}
.footer-space{height:26px}
</style>
</head>
<body>
<div class="header"><div class="wrap"><div class="brand"><img id="logo"><div><h1>Alwan Quote Pro</h1><p>Alwan Painting Services Pty Ltd · 0404994400</p></div></div></div></div>

<div class="wrap">
  <div class="card">
    <div class="toolbar">
      <button onclick="newQuote()">New Quote</button>
      <button class="secondary" onclick="saveQuote()">Save Quote</button>
      <button class="secondary" onclick="saveCustomer()">Save Customer</button>
      <button class="ghost" onclick="window.print()">Print / PDF</button>
      <button class="ghost" onclick="exportData()">Export Backup</button>
      <button class="ghost" onclick="document.getElementById('importFile').click()">Import Backup</button>
      <input id="importFile" class="hidden" type="file" accept=".json" onchange="importData(event)">
    </div>
    <div class="notice">Working lightweight pro version. Upload both index.html and the assets folder to GitHub.</div>
  </div>

  <div class="card">
    <h2>Quote Details</h2>
    <div class="row grid-4">
      <div><label>Quote No.</label><input id="quoteNo"></div>
      <div><label>Date</label><input id="quoteDate" type="date"></div>
      <div><label>Document Type</label><select id="docType"><option>Quote</option><option>Invoice</option></select></div>
      <div><label>Project Type</label><select id="projectType"><option>Interior</option><option>Exterior</option><option>Full House</option></select></div>
      <div><label>Customer Name</label><input id="customerName"></div>
      <div><label>Customer Phone</label><input id="customerPhone"></div>
      <div><label>Customer Email</label><input id="customerEmail"></div>
      <div><label>Site Address</label><input id="siteAddress"></div>
    </div>
    <div style="margin-top:12px"><label>Scope of Works</label><textarea id="scope">Interior painting including walls, ceilings, doors, windows and trims. Surface preparation includes sanding, patching and undercoating where required.</textarea></div>
  </div>

  <div class="row grid-2">
    <div class="card">
      <h2>Add Item</h2>
      <label>Quick Categories</label>
      <div id="chips" class="category-chips"></div>

      <div class="row grid-4" style="margin-top:12px">
        <div><label>Category</label><select id="category" onchange="changeCategory()"></select></div>
        <div><label>Type</label><input id="itemType"></div>
        <div><label>Unit</label><select id="unit"><option>m²</option><option>lm</option><option>each</option></select></div>
        <div><label>Quantity</label><input id="quantity" type="number" step="0.01" value="1"></div>
        <div><label>Base Rate</label><input id="baseRate" type="number" step="0.01" value="0"></div>
        <div><label>Condition</label><select id="condition"><option value="0">Good</option><option value="4">Minor Cracks</option><option value="8">Heavy Repair</option></select></div>
        <div><label>Coats</label><select id="coats"><option value="0">1 coat</option><option value="2">2 coats</option><option value="4">3 coats</option></select></div>
        <div><label>Finish</label><select id="finish"><option value="0">Standard</option><option value="2">Premium Finish</option><option value="4">Gloss / Enamel</option></select></div>
      </div>

      <div class="checks" style="margin-top:12px">
        <label class="chk"><input type="checkbox" id="sanding"> Sanding</label>
        <label class="chk"><input type="checkbox" id="patching"> Patching</label>
        <label class="chk"><input type="checkbox" id="undercoat"> Undercoat</label>
        <label class="chk"><input type="checkbox" id="decorative"> Decorative Detail</label>
        <label class="chk"><input type="checkbox" id="highAccess"> High Access</label>
        <label class="chk"><input type="checkbox" id="useSample" checked> Use Sample Photo</label>
      </div>

      <div class="row grid-2" style="margin-top:12px">
        <div><label>Item Notes</label><input id="itemNotes"></div>
        <div><label>Upload Your Photo</label><input id="uploadPhoto" type="file" accept="image/*" onchange="previewUpload(event)"></div>
      </div>

      <div style="margin-top:14px"><label>Category Samples</label><div id="gallery" class="gallery"></div></div>

      <div class="toolbar" style="margin-top:14px">
        <button class="ok" onclick="addItem()">Add Item</button>
        <button class="ghost" onclick="clearItemForm()">Clear Item</button>
      </div>
    </div>

    <div class="card">
      <h2>Summary</h2>
      <div class="quickrate">
        <div class="kbox"><div class="n" id="subtotalKpi">$0.00</div><div class="s">Subtotal</div></div>
        <div class="kbox"><div class="n" id="gstKpi">$0.00</div><div class="s">GST</div></div>
        <div class="kbox"><div class="n" id="totalKpi">$0.00</div><div class="s">Total</div></div>
        <div class="kbox"><div class="n" id="depositKpi">$0.00</div><div class="s">Deposit</div></div>
      </div>

      <div class="row grid-4" style="margin-top:12px">
        <div><label>Misc Cost</label><input id="miscCost" type="number" value="0" step="0.01" oninput="refreshTotals()"></div>
        <div><label>Discount</label><input id="discount" type="number" value="0" step="0.01" oninput="refreshTotals()"></div>
        <div><label>GST %</label><input id="gstRate" type="number" value="10" step="0.01" oninput="refreshTotals()"></div>
        <div><label>Deposit %</label><input id="depositRate" type="number" value="30" step="0.01" oninput="refreshTotals()"></div>
      </div>
    </div>
  </div>

  <div class="card"><h2>Quote Items</h2><div id="items" class="items"></div></div>
  <div class="footer-space"></div>
</div>

<script>
const LOGO = "data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20200%20200%22%3E%0A%3Crect%20width%3D%22200%22%20height%3D%22200%22%20rx%3D%2228%22%20fill%3D%22%23fff7e6%22/%3E%0A%3Cpath%20d%3D%22M35%2085c0-28%2023-51%2051-51h33c25%200%2046%2018%2050%2042l6%2037c2%2013-8%2025-22%2025h-18V101h-16v37H85v-25H69v25H47c-10%200-18-8-17-18l5-35z%22%20fill%3D%22%2316263d%22/%3E%0A%3Cpath%20d%3D%22M46%2072h116%22%20stroke%3D%22%232da6ff%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22/%3E%0A%3Cpath%20d%3D%22M42%2094h124%22%20stroke%3D%22%2329b362%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22/%3E%0A%3Cpath%20d%3D%22M38%20116h128%22%20stroke%3D%22%23f1c40f%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22/%3E%0A%3Cpath%20d%3D%22M36%20138h124%22%20stroke%3D%22%23e67e22%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22/%3E%0A%3Cpath%20d%3D%22M44%20158h108%22%20stroke%3D%22%23d62839%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22/%3E%0A%3Ctext%20x%3D%2226%22%20y%3D%22188%22%20font-size%3D%2234%22%20font-family%3D%22Arial%22%20font-weight%3D%22800%22%20fill%3D%22%23c98c1f%22%3EALWAN%3C/text%3E%0A%3C/svg%3E";
document.getElementById('logo').src = LOGO;
const CATALOG = {"Doors": [{"type": "Flush Horizontal Groove Door", "rate": 150, "unit": "each", "img": "assets/door1.jpeg"}, {"type": "Five Panel Door", "rate": 170, "unit": "each", "img": "assets/door2.jpeg"}, {"type": "Two Panel Designer Door", "rate": 165, "unit": "each", "img": "assets/door3.jpeg"}, {"type": "Modern Line Detail Door", "rate": 180, "unit": "each", "img": "assets/door4.jpeg"}, {"type": "Plain Flush Door", "rate": 120, "unit": "each", "img": "assets/door5.jpeg"}, {"type": "Four Panel Door", "rate": 160, "unit": "each", "img": "assets/door6.jpeg"}], "Windows": [{"type": "Classic Timber Window", "rate": 145, "unit": "each", "img": "assets/window1.jpeg"}, {"type": "Double Hung Window", "rate": 135, "unit": "each", "img": "assets/window2.jpeg"}, {"type": "Sliding Window", "rate": 120, "unit": "each", "img": "assets/window2.jpeg"}, {"type": "Decorative Window", "rate": 165, "unit": "each", "img": "assets/window1.jpeg"}], "Ceilings": [{"type": "Flat Ceiling", "rate": 13, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}, {"type": "Coffered Ceiling", "rate": 22, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}, {"type": "Tray Ceiling", "rate": 18, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}, {"type": "Drop Ceiling", "rate": 16, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}, {"type": "Vaulted / Cathedral Ceiling", "rate": 24, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}, {"type": "Decorative / Custom Ceiling", "rate": 28, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}], "Walls": [{"type": "Standard Wall", "rate": 12, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}, {"type": "Feature Wall", "rate": 15, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}, {"type": "Repair Wall", "rate": 18, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}], "Trims": [{"type": "Skirting", "rate": 12, "unit": "lm", "img": "assets/door2.jpeg"}, {"type": "Architrave", "rate": 14, "unit": "lm", "img": "assets/door3.jpeg"}, {"type": "Door Frame", "rate": 28, "unit": "each", "img": "assets/door4.jpeg"}]};
let state = {items:[], selectedSample:'', uploadedImage:''};

function $(id){return document.getElementById(id)}
function money(n){return '$'+(Number(n)||0).toFixed(2)}

function init(){
  const cat=$('category');
  Object.keys(CATALOG).forEach(name=>{const o=document.createElement('option');o.value=name;o.textContent=name;cat.appendChild(o);});
  $('category').value='Doors';
  $('quoteDate').value=new Date().toISOString().slice(0,10);
  $('quoteNo').value='Q-'+Date.now().toString().slice(-6);
  renderChips(); renderGallery(); renderItems(); refreshTotals();
}

function renderChips(){
  const box=$('chips'); box.innerHTML='';
  Object.keys(CATALOG).forEach(name=>{
    const chip=document.createElement('button');
    chip.type='button';
    chip.className='chip'+($('category').value===name?' active':'');
    chip.textContent=name;
    chip.onclick=()=>{$('category').value=name; changeCategory();};
    box.appendChild(chip);
  });
}

function changeCategory(){$('itemType').value=''; state.selectedSample=''; renderChips(); renderGallery();}

function renderGallery(){
  const samples=CATALOG[$('category').value] || [];
  const box=$('gallery'); box.innerHTML='';
  samples.forEach((s,i)=>{
    const tile=document.createElement('div');
    tile.className='tile'+(state.selectedSample===s.img?' active':'');
    tile.innerHTML=`<img src="${s.img}" alt=""><div class="t1">${s.type}</div><div class="t2">${money(s.rate)} / ${s.unit}</div>`;
    tile.onclick=()=>{state.selectedSample=s.img;$('itemType').value=s.type;$('baseRate').value=s.rate;$('unit').value=s.unit;renderGallery();};
    box.appendChild(tile);
    if(i===0 && !$('itemType').value){state.selectedSample=s.img;$('itemType').value=s.type;$('baseRate').value=s.rate;$('unit').value=s.unit;}
  });
}

function previewUpload(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader(); reader.onload=()=>state.uploadedImage=reader.result; reader.readAsDataURL(file);
}

function extrasCost(q){let e=0;if($('sanding').checked)e+=3*q;if($('patching').checked)e+=4*q;if($('undercoat').checked)e+=2*q;if($('decorative').checked)e+=5*q;if($('highAccess').checked)e+=6*q;e+=Number($('condition').value||0)*q;e+=Number($('coats').value||0)*q;e+=Number($('finish').value||0)*q;return e;}

function addItem(){
  const qty=Number($('quantity').value||0), rate=Number($('baseRate').value||0), type=$('itemType').value.trim();
  if(!type || !qty){alert('Please choose an item type and quantity.');return;}
  const extra=extrasCost(qty), total=qty*rate+extra, image=state.uploadedImage || ($('useSample').checked?state.selectedSample:'');
  state.items.push({id:Date.now()+Math.random(),category:$('category').value,type,unit:$('unit').value,qty,rate,extra,total,notes:$('itemNotes').value,image});
  renderItems(); refreshTotals(); clearItemForm();
}

function clearItemForm(){$('quantity').value=1;$('itemNotes').value='';$('uploadPhoto').value='';['sanding','patching','undercoat','decorative','highAccess'].forEach(id=>$(id).checked=false);state.uploadedImage='';}

function renderItems(){
  const box=$('items'); box.innerHTML='';
  if(!state.items.length){box.innerHTML='<div class="small">No items yet.</div>';return;}
  state.items.forEach(item=>{
    const row=document.createElement('div'); row.className='item';
    row.innerHTML=`<img src="${item.image || ''}" alt=""><div><div class="title">${item.type}</div><div class="meta">${item.category} · ${item.qty} ${item.unit} × ${money(item.rate)} · Extras ${money(item.extra)}</div>${item.notes?`<div class="meta">${item.notes}</div>`:''}</div><div><div class="amt">${money(item.total)}</div><button class="danger" style="margin-top:8px" onclick="removeItem(${item.id})">Delete</button></div>`;
    box.appendChild(row);
  });
}

function removeItem(id){state.items=state.items.filter(x=>x.id!==id);renderItems();refreshTotals();}

function refreshTotals(){
  const subtotal=state.items.reduce((s,i)=>s+i.total,0)+Number($('miscCost').value||0)-Number($('discount').value||0);
  const gst=Math.max(0,subtotal)*(Number($('gstRate').value||0)/100), total=subtotal+gst, deposit=total*(Number($('depositRate').value||0)/100);
  $('subtotalKpi').textContent=money(subtotal); $('gstKpi').textContent=money(gst); $('totalKpi').textContent=money(total); $('depositKpi').textContent=money(deposit);
}

function saveCustomer(){
  const customer={name:$('customerName').value.trim(),phone:$('customerPhone').value.trim(),email:$('customerEmail').value.trim(),address:$('siteAddress').value.trim()};
  if(!customer.name){alert('Enter customer name first.');return;}
  const arr=JSON.parse(localStorage.getItem('alwan_customers')||'[]'); const idx=arr.findIndex(x=>x.name.toLowerCase()===customer.name.toLowerCase()); if(idx>=0)arr[idx]=customer; else arr.unshift(customer);
  localStorage.setItem('alwan_customers', JSON.stringify(arr)); alert('Customer saved on this device.');
}

function saveQuote(){
  const arr=JSON.parse(localStorage.getItem('alwan_quotes')||'[]');
  arr.unshift({quoteNo:$('quoteNo').value,date:$('quoteDate').value,customer:$('customerName').value,items:state.items});
  localStorage.setItem('alwan_quotes', JSON.stringify(arr)); alert('Quote saved on this device.');
}

function exportData(){
  const payload={customers:JSON.parse(localStorage.getItem('alwan_customers')||'[]'),quotes:JSON.parse(localStorage.getItem('alwan_quotes')||'[]')};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='alwan-backup.json'; a.click();
}

function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader(); reader.onload=()=>{try{const data=JSON.parse(reader.result); if(data.customers)localStorage.setItem('alwan_customers',JSON.stringify(data.customers)); if(data.quotes)localStorage.setItem('alwan_quotes',JSON.stringify(data.quotes)); alert('Backup imported.');}catch(e){alert('Invalid backup file.')}}; reader.readAsText(file);
}

function newQuote(){location.reload();}
init();
</script>
</body>
</html>
