<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Alwan Quote Pro - Single File</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#18202a;--muted:#667085;--line:#e5e7eb;--brand:#16324f;--brand2:#d59b2d;--danger:#c0392b}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
.header{position:sticky;top:0;z-index:20;background:rgba(246,247,251,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.wrap{max-width:1100px;margin:0 auto;padding:14px}.brand{display:flex;gap:12px;align-items:center}.brand img{width:54px;height:54px;border-radius:12px;object-fit:cover;background:#fff;border:1px solid var(--line)}
.brand h1{font-size:22px;line-height:1.1;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:13px}.row{display:grid;gap:12px}.grid-2{grid-template-columns:1fr 1fr}.grid-4{grid-template-columns:repeat(4,1fr)}
@media (max-width:860px){.grid-2,.grid-4{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 6px 20px rgba(16,24,40,.04)}.card h2{margin:0 0 14px;font-size:20px}
label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px} input,select,textarea,button{font:inherit}
input,select,textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink)} textarea{min-height:96px;resize:vertical}
.toolbar{display:flex;flex-wrap:wrap;gap:10px} button{border:0;border-radius:12px;padding:12px 14px;background:var(--brand);color:#fff;font-weight:700}
button.secondary{background:#fff;color:var(--brand);border:1px solid var(--line)} button.ghost{background:#f2f4f7;color:var(--ink)} button.danger{background:var(--danger)}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:12px}.tile{border:1px solid var(--line);border-radius:16px;background:#fff;padding:10px;cursor:pointer}.tile.active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(22,50,79,.08)}
.tile img{width:100%;aspect-ratio:1/1;border-radius:12px;object-fit:cover;background:#f8f8f8}.tile .t1{font-weight:700;font-size:13px;margin-top:8px}.tile .t2{font-size:12px;color:var(--muted)}
.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}@media (max-width:860px){.kpi{grid-template-columns:repeat(2,1fr)}} .kpi .box{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}
.kpi .box .n{font-size:24px;font-weight:800}.kpi .box .s{font-size:12px;color:var(--muted)} .items{display:grid;gap:10px}
.item{display:grid;grid-template-columns:84px 1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:16px;background:#fff;padding:10px}
.item img{width:84px;height:84px;object-fit:cover;border-radius:12px;background:#f6f7fb;border:1px solid var(--line)} .item .title{font-weight:800}
.item .meta{font-size:13px;color:var(--muted);margin-top:4px}.item .amt{font-weight:800;font-size:18px;text-align:right}.item .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.checks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}@media (max-width:860px){.checks{grid-template-columns:repeat(2,1fr)}} .chk{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:12px}.chk input{width:auto}
.small{font-size:12px;color:var(--muted)}.hr{height:1px;background:var(--line);margin:10px 0}.hidden{display:none}.footer-space{height:18px}
.notice{padding:10px 12px;border-radius:12px;background:#fffaeb;color:#8a5a00;border:1px solid #f5d489}
</style>
</head>
<body>
<div class="header"><div class="wrap"><div class="brand"><img id="logo" alt="Alwan logo"><div><h1>Alwan Quote Pro</h1><p>Alwan Painting Services Pty Ltd · 0404994400</p></div></div></div></div>
<div class="wrap row">
<div class="card"><div class="toolbar">
<button onclick="newQuote()">New Quote</button>
<button class="secondary" onclick="saveQuote()">Save Quote</button>
<button class="secondary" onclick="saveCustomer()">Save Customer</button>
<button class="ghost" onclick="window.print()">Print / PDF</button>
<button class="ghost" onclick="exportData()">Export Backup</button>
<button class="ghost" onclick="document.getElementById('importFile').click()">Import Backup</button>
<input id="importFile" type="file" accept=".json" class="hidden" onchange="importData(event)">
</div><div style="margin-top:12px" class="notice">Single-file version: everything is inside one HTML file.</div></div>

<div class="row grid-2">
<div class="card"><h2>Quote Details</h2>
<div class="row grid-2">
<div><label>Quote No.</label><input id="quoteNo"></div>
<div><label>Date</label><input id="quoteDate" type="date"></div>
<div><label>Document Type</label><select id="docType"><option>Quote</option><option>Invoice</option></select></div>
<div><label>Project Type</label><select id="projectType"><option>Interior</option><option>Exterior</option><option>Full House</option></select></div>
</div>
<div class="hr"></div>
<div class="row grid-2">
<div><label>Customer Name</label><input id="customerName" placeholder="Customer full name"></div>
<div><label>Customer Phone</label><input id="customerPhone" placeholder="0400..."></div>
<div><label>Customer Email</label><input id="customerEmail" placeholder="customer@email.com"></div>
<div><label>Site Address</label><input id="siteAddress" placeholder="Project address"></div>
</div>
<div style="margin-top:12px"><label>Scope of Works</label><textarea id="scope">Interior painting including walls, ceilings, doors and trims. Surface preparation includes sanding, patching and undercoating where required.</textarea></div>
</div>

<div class="card"><h2>Customers</h2>
<label>Saved Customers</label><select id="savedCustomers" onchange="loadCustomerFromSelect()"><option value="">Select saved customer</option></select>
<div style="margin-top:12px"><label>Search</label><input id="customerSearch" oninput="filterCustomers()" placeholder="Type customer name"></div>
<div id="customerList" style="margin-top:12px" class="items"></div>
</div></div>

<div class="card"><h2>Add Item</h2>
<div class="row grid-4">
<div><label>Category</label><select id="category" onchange="renderGallery()"></select></div>
<div><label>Type</label><input id="itemType" placeholder="Tap a sample below"></div>
<div><label>Unit</label><select id="unit"><option>m²</option><option>lm</option><option>each</option></select></div>
<div><label>Quantity</label><input id="quantity" type="number" step="0.01" value="1"></div>
<div><label>Base Rate</label><input id="baseRate" type="number" step="0.01" value="0"></div>
<div><label>Condition</label><select id="condition"><option value="0">Good</option><option value="4">Minor Cracks</option><option value="8">Heavy Repair</option></select></div>
<div><label>Coats</label><select id="coats"><option value="0">1 coat</option><option value="2">2 coats</option><option value="4">3 coats</option></select></div>
<div><label>Finish</label><select id="finish"><option value="0">Standard</option><option value="2">Premium Finish</option><option value="4">Gloss / Enamel</option></select></div>
</div>
<div style="margin-top:12px" class="checks">
<label class="chk"><input type="checkbox" id="sanding"> Sanding</label>
<label class="chk"><input type="checkbox" id="patching"> Patching</label>
<label class="chk"><input type="checkbox" id="undercoat"> Undercoat</label>
<label class="chk"><input type="checkbox" id="decorative"> Decorative Detail</label>
<label class="chk"><input type="checkbox" id="highAccess"> High Access</label>
<label class="chk"><input type="checkbox" id="useSample" checked> Use Sample Photo</label>
</div>
<div style="margin-top:12px" class="row grid-2">
<div><label>Item Notes</label><input id="itemNotes" placeholder="Optional notes"></div>
<div><label>Upload Your Photo</label><input id="uploadPhoto" type="file" accept="image/*" onchange="previewUpload(event)"></div>
</div>
<div style="margin-top:14px"><label>Category Samples</label><div id="gallery" class="gallery"></div></div>
<div style="margin-top:14px" class="toolbar"><button onclick="addItem()">Add Item</button><button class="ghost" onclick="clearItemForm()">Clear Item</button></div>
</div>

<div class="row grid-2">
<div class="card"><h2>Quote Items</h2><div id="items" class="items"></div></div>
<div class="card"><h2>Summary</h2>
<div class="kpi">
<div class="box"><div class="n" id="subtotalKpi">$0.00</div><div class="s">Subtotal</div></div>
<div class="box"><div class="n" id="gstKpi">$0.00</div><div class="s">GST</div></div>
<div class="box"><div class="n" id="totalKpi">$0.00</div><div class="s">Total</div></div>
<div class="box"><div class="n" id="depositKpi">$0.00</div><div class="s">Deposit</div></div>
</div>
<div class="row grid-2" style="margin-top:14px">
<div><label>Misc Cost</label><input id="miscCost" type="number" value="0" step="0.01" oninput="refreshTotals()"></div>
<div><label>Discount</label><input id="discount" type="number" value="0" step="0.01" oninput="refreshTotals()"></div>
<div><label>GST %</label><input id="gstRate" type="number" value="10" step="0.01" oninput="refreshTotals()"></div>
<div><label>Deposit %</label><input id="depositRate" type="number" value="30" step="0.01" oninput="refreshTotals()"></div>
</div>
<div style="margin-top:12px"><label>Payment Terms</label><textarea id="paymentTerms">30% deposit is payable to secure the booking. Balance due upon completion of works unless otherwise agreed in writing.</textarea></div>
</div></div>
<div class="footer-space"></div></div>

<script>
const logoSvg = 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect width="200" height="200" rx="28" fill="#fff7e6"/><path d="M35 85c0-28 23-51 51-51h33c25 0 46 18 50 42l6 37c2 13-8 25-22 25h-18V101h-16v37H85v-25H69v25H47c-10 0-18-8-17-18l5-35z" fill="#16263d"/><path d="M46 72h116" stroke="#2da6ff" stroke-width="8" stroke-linecap="round"/><path d="M42 94h124" stroke="#29b362" stroke-width="8" stroke-linecap="round"/><path d="M38 116h128" stroke="#f1c40f" stroke-width="8" stroke-linecap="round"/><path d="M36 138h124" stroke="#e67e22" stroke-width="8" stroke-linecap="round"/><path d="M44 158h108" stroke="#d62839" stroke-width="8" stroke-linecap="round"/><text x="26" y="188" font-size="34" font-family="Arial" font-weight="800" fill="#c98c1f">ALWAN</text></svg>');
document.getElementById('logo').src = logoSvg;
function makeSample(cat, sub){
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320"><rect width="320" height="320" rx="28" fill="#ffffff"/><rect x="16" y="16" width="288" height="288" rx="22" fill="#f8fafc" stroke="#d0d5dd"/><circle cx="50" cy="50" r="14" fill="#16324f"/><rect x="34" y="88" width="252" height="10" rx="5" fill="#d59b2d"/><rect x="34" y="106" width="210" height="8" rx="4" fill="#cfd4dc"/><rect x="34" y="126" width="172" height="8" rx="4" fill="#e5e7eb"/><rect x="34" y="164" width="252" height="94" rx="18" fill="#fff"/><text x="160" y="208" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#16324f">'+cat+'</text><text x="160" y="240" text-anchor="middle" font-size="20" font-family="Arial" fill="#667085">'+sub+'</text></svg>';
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}
const samples = {
  Walls:[{type:'Standard Wall',rate:12,unit:'m²',img:makeSample('Wall','Standard')},{type:'Feature Wall',rate:15,unit:'m²',img:makeSample('Wall','Feature')},{type:'Repair Wall',rate:18,unit:'m²',img:makeSample('Wall','Repair')}],
  Ceilings:[{type:'Plain Ceiling',rate:13,unit:'m²',img:makeSample('Ceiling','Plain')},{type:'With Cornice',rate:15,unit:'m²',img:makeSample('Ceiling','Cornice')},{type:'Decorative Cornice',rate:18,unit:'m²',img:makeSample('Ceiling','Decor')}],
  Doors:[{type:'Simple Door',rate:120,unit:'each',img:makeSample('Door','Simple')},{type:'Panel Door',rate:170,unit:'each',img:makeSample('Door','Panel')},{type:'Glass Door',rate:200,unit:'each',img:makeSample('Door','Glass')}],
  Windows:[{type:'Simple Window',rate:95,unit:'each',img:makeSample('Window','Simple')},{type:'Timber Window',rate:135,unit:'each',img:makeSample('Window','Timber')},{type:'Decorative Window',rate:165,unit:'each',img:makeSample('Window','Decor')}],
  Trims:[{type:'Skirting',rate:12,unit:'lm',img:makeSample('Trim','Skirting')},{type:'Architrave',rate:14,unit:'lm',img:makeSample('Trim','Arch')},{type:'Frame',rate:28,unit:'each',img:makeSample('Trim','Frame')}],
  Handrails:[{type:'Simple Handrail',rate:35,unit:'lm',img:makeSample('Handrail','Simple')},{type:'Decorative Handrail',rate:55,unit:'lm',img:makeSample('Handrail','Decor')},{type:'Balustrade',rate:65,unit:'lm',img:makeSample('Handrail','Balustrade')}],
  Stairs:[{type:'Standard Stair',rate:35,unit:'each',img:makeSample('Stair','Standard')},{type:'Feature Stair',rate:55,unit:'each',img:makeSample('Stair','Feature')},{type:'Riser + Tread',rate:45,unit:'each',img:makeSample('Stair','Riser')}],
  Exterior:[{type:'Exterior Wall',rate:18,unit:'m²',img:makeSample('Exterior','Wall')},{type:'Eaves',rate:16,unit:'m²',img:makeSample('Exterior','Eaves')},{type:'Fence',rate:28,unit:'lm',img:makeSample('Exterior','Fence')}]
};
let state = {items:[], uploadedImage:'', selectedSample:''};
function $(id){return document.getElementById(id)} function money(n){return '$'+(Number(n)||0).toFixed(2)}
function init(){
  const catSel = $('category'); Object.keys(samples).forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;catSel.appendChild(o);});
  $('quoteDate').value = new Date().toISOString().slice(0,10); $('quoteNo').value = 'Q-' + Date.now().toString().slice(-6); renderGallery(); renderCustomers(); refreshTotals();
}
function renderGallery(){
  const cat = $('category').value || Object.keys(samples)[0], box = $('gallery'); box.innerHTML='';
  samples[cat].forEach((s,idx)=>{ const el=document.createElement('div'); el.className='tile'+(state.selectedSample===s.img?' active':'');
    el.innerHTML='<img src="'+s.img+'"><div class="t1">'+s.type+'</div><div class="t2">'+money(s.rate)+' / '+s.unit+'</div>';
    el.onclick=()=>{state.selectedSample=s.img; $('itemType').value=s.type; $('baseRate').value=s.rate; $('unit').value=s.unit; renderGallery();}; box.appendChild(el);
    if(idx===0 && !$('itemType').value){$('itemType').value=s.type; $('baseRate').value=s.rate; $('unit').value=s.unit; state.selectedSample=s.img;}
  });
}
function previewUpload(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{state.uploadedImage=r.result}; r.readAsDataURL(f); }
function extrasCost(q){ let e=0; if($('sanding').checked)e+=3*q; if($('patching').checked)e+=4*q; if($('undercoat').checked)e+=2*q; if($('decorative').checked)e+=5*q; if($('highAccess').checked)e+=6*q; e+=Number($('condition').value||0)*q; e+=Number($('coats').value||0)*q; e+=Number($('finish').value||0)*q; return e; }
function clearItemForm(){ $('quantity').value=1; $('itemNotes').value=''; $('uploadPhoto').value=''; ['sanding','patching','undercoat','decorative','highAccess'].forEach(id=>$(id).checked=false); state.uploadedImage=''; }
function addItem(){
  const qty=Number($('quantity').value||0), rate=Number($('baseRate').value||0), type=$('itemType').value.trim();
  if(!type || !qty){ alert('Please choose an item type and quantity.'); return; }
  const base=qty*rate, extra=extrasCost(qty), total=base+extra, image=state.uploadedImage || ($('useSample').checked ? state.selectedSample : '');
  state.items.push({id:Date.now()+Math.random(), category:$('category').value, type:type, unit:$('unit').value, qty:qty, rate:rate, extra:extra, total:total, notes:$('itemNotes').value, image:image});
  renderItems(); refreshTotals(); clearItemForm();
}
function removeItem(id){ state.items=state.items.filter(x=>x.id!==id); renderItems(); refreshTotals(); }
function renderItems(){
  const wrap=$('items'); wrap.innerHTML=''; if(!state.items.length){wrap.innerHTML='<div class="small">No items yet.</div>'; return;}
  state.items.forEach(item=>{ const el=document.createElement('div'); el.className='item';
    el.innerHTML='<img src="'+(item.image || makeSample(item.category,item.type))+'"><div><div class="title">'+item.type+'</div><div class="meta">'+item.category+' · '+item.qty+' '+item.unit+' × '+money(item.rate)+' · Extras '+money(item.extra)+'</div>'+(item.notes?'<div class="meta">'+item.notes+'</div>':'')+'</div><div><div class="amt">'+money(item.total)+'</div><div class="actions"><button class="danger" onclick="removeItem('+item.id+')">Delete</button></div></div>';
    wrap.appendChild(el);
  });
}
function refreshTotals(){
  const subtotal=state.items.reduce((a,b)=>a+b.total,0)+Number($('miscCost').value||0)-Number($('discount').value||0), gst=Math.max(0,subtotal)*(Number($('gstRate').value||0)/100), total=Math.max(0,subtotal+gst), deposit=total*(Number($('depositRate').value||0)/100);
  $('subtotalKpi').textContent=money(subtotal); $('gstKpi').textContent=money(gst); $('totalKpi').textContent=money(total); $('depositKpi').textContent=money(deposit);
}
function saveCustomer(){
  const customer={name:$('customerName').value.trim(), phone:$('customerPhone').value.trim(), email:$('customerEmail').value.trim(), address:$('siteAddress').value.trim()};
  if(!customer.name){ alert('Enter customer name first.'); return; }
  const arr=JSON.parse(localStorage.getItem('alwan_customers')||'[]'); const idx=arr.findIndex(x=>x.name.toLowerCase()===customer.name.toLowerCase()); if(idx>=0)arr[idx]=customer; else arr.unshift(customer);
  localStorage.setItem('alwan_customers', JSON.stringify(arr)); renderCustomers(); alert('Customer saved.');
}
function renderCustomers(){
  const arr=JSON.parse(localStorage.getItem('alwan_customers')||'[]'), sel=$('savedCustomers'); sel.innerHTML='<option value="">Select saved customer</option>';
  arr.forEach((c,i)=>{const o=document.createElement('option'); o.value=i; o.textContent=c.name+' · '+(c.phone||''); sel.appendChild(o);}); showCustomerCards(arr);
}
function showCustomerCards(arr){
  const box=$('customerList'); box.innerHTML=''; arr.slice(0,8).forEach((c,i)=>{ const el=document.createElement('div'); el.className='item'; el.innerHTML='<img src="'+makeSample('Customer',(c.name.split(' ')[0]||'Saved'))+'"><div><div class="title">'+c.name+'</div><div class="meta">'+(c.phone||'')+(c.email?' · '+c.email:'')+'</div><div class="meta">'+(c.address||'')+'</div></div><div><button onclick="useCustomer('+i+')">Use</button></div>'; box.appendChild(el); });
}
function useCustomer(i){ const arr=JSON.parse(localStorage.getItem('alwan_customers')||'[]'); const c=arr[i]; if(!c)return; $('customerName').value=c.name||''; $('customerPhone').value=c.phone||''; $('customerEmail').value=c.email||''; $('siteAddress').value=c.address||''; }
function loadCustomerFromSelect(){ const i=$('savedCustomers').value; if(i==='')return; useCustomer(Number(i)); }
function filterCustomers(){ const q=$('customerSearch').value.toLowerCase(); const arr=JSON.parse(localStorage.getItem('alwan_customers')||'[]').filter(c=>JSON.stringify(c).toLowerCase().includes(q)); showCustomerCards(arr); }
function saveQuote(){ const quotes=JSON.parse(localStorage.getItem('alwan_quotes')||'[]'); quotes.unshift({quoteNo:$('quoteNo').value,quoteDate:$('quoteDate').value,docType:$('docType').value,projectType:$('projectType').value,customerName:$('customerName').value,customerPhone:$('customerPhone').value,customerEmail:$('customerEmail').value,siteAddress:$('siteAddress').value,scope:$('scope').value,items:state.items,miscCost:$('miscCost').value,discount:$('discount').value,gstRate:$('gstRate').value,depositRate:$('depositRate').value,paymentTerms:$('paymentTerms').value}); localStorage.setItem('alwan_quotes', JSON.stringify(quotes)); alert('Quote saved on this device.'); }
function exportData(){ const payload={customers:JSON.parse(localStorage.getItem('alwan_customers')||'[]'),quotes:JSON.parse(localStorage.getItem('alwan_quotes')||'[]')}; const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='alwan-backup.json'; a.click(); URL.revokeObjectURL(a.href); }
function importData(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ const data=JSON.parse(r.result); if(data.customers)localStorage.setItem('alwan_customers', JSON.stringify(data.customers)); if(data.quotes)localStorage.setItem('alwan_quotes', JSON.stringify(data.quotes)); renderCustomers(); alert('Backup imported.'); }catch(err){ alert('Invalid backup file.'); } }; r.readAsText(f); }
function newQuote(){ location.reload(); }
init();
</script>
</body>
</html>
