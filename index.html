
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alwan Quote Pro</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#172230;--muted:#667085;--line:#e4e7ec;--brand:#16324f;--soft:#eef2f6;--ok:#137a4b;--danger:#c0392b}
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:var(--ink);font-family:Arial,sans-serif}
.wrap{max-width:1200px;margin:auto;padding:14px}.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:14px;position:relative}
.header{position:sticky;top:0;background:#f4f7fb;border-bottom:1px solid var(--line);z-index:5}.brand{display:flex;gap:12px;align-items:center}.brand img{width:64px;height:64px;border-radius:16px;object-fit:cover;border:1px solid var(--line)}
.sectionhead{display:flex;gap:10px;align-items:center;margin-bottom:10px}.sectionhead img{width:28px;height:28px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}
.watermark{position:absolute;right:10px;top:10px;width:52px;height:52px;opacity:.08;object-fit:cover}
.row{display:grid;gap:12px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}}
input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px}textarea{min-height:90px}
button{padding:12px 16px;border:0;border-radius:12px;background:var(--brand);color:#fff;font-weight:700}.ghost{background:var(--soft);color:var(--ink)}.ok{background:var(--ok)}.danger{background:var(--danger)}
.toolbar,.chips{display:flex;gap:10px;flex-wrap:wrap}.chip{padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer}.chip.active{background:var(--brand);color:#fff}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}.tile{border:1px solid var(--line);border-radius:18px;padding:10px;position:relative;background:#fff;cursor:pointer}.tile img{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:12px;border:1px solid var(--line)}.tile.active{outline:2px solid var(--brand)}
.del{position:absolute;top:14px;right:14px;padding:6px 8px;font-size:12px}.small{font-size:12px;color:var(--muted)}
.items{display:grid;gap:10px}.item{display:grid;grid-template-columns:90px 1fr auto;gap:12px;border:1px solid var(--line);border-radius:18px;padding:10px}.item img{width:90px;height:110px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
.notice{padding:10px 12px;border:1px solid #f0d596;background:#fff8e8;border-radius:12px;color:#8a5a00}
</style>
</head>
<body>
<div class="header"><div class="wrap"><div class="brand"><img src="assets/logo.jpeg"><div><h1 style="margin:0">Alwan Quote Pro</h1><div class="small">Alwan Painting Services Pty Ltd · 0404994400</div></div></div></div></div>
<div class="wrap">
  <div class="card"><img class="watermark" src="assets/logo.jpeg"><div class="sectionhead"><img src="assets/logo.jpeg"><h2 style="margin:0">Controls</h2></div>
    <div class="toolbar">
      <button onclick="newQuote()">New Quote</button>
      <button onclick="saveQuote()">Save Quote</button>
      <button onclick="saveCustomer()">Save Customer</button>
      <button class="ghost" onclick="window.print()">Print / PDF</button>
      <button class="ghost" onclick="exportData()">Export Backup</button>
      <input id="importFile" type="file" accept=".json" onchange="importData(event)">
    </div>
    <div class="notice" style="margin-top:10px">Correct logo added. You can add images and delete custom images by category.</div>
  </div>

  <div class="card"><img class="watermark" src="assets/logo.jpeg"><div class="sectionhead"><img src="assets/logo.jpeg"><h2 style="margin:0">Image Manager</h2></div>
    <div class="row g4">
      <div><label>Category</label><select id="imgCategory"></select></div>
      <div><label>Title</label><input id="imgTitle"></div>
      <div><label>Rate</label><input id="imgRate" type="number" value="0"></div>
      <div><label>Unit</label><select id="imgUnit"><option>each</option><option>m²</option><option>lm</option></select></div>
    </div>
    <div class="row g2" style="margin-top:12px">
      <div><label>Upload image</label><input id="imgUpload" type="file" accept="image/*" onchange="storePendingImage(event)"></div>
      <div style="align-self:end"><button class="ok" onclick="addCustomSample()">Add Image To Category</button></div>
    </div>
  </div>

  <div class="card"><img class="watermark" src="assets/logo.jpeg"><div class="sectionhead"><img src="assets/logo.jpeg"><h2 style="margin:0">Quote Details</h2></div>
    <div class="row g4">
      <div><label>Quote No.</label><input id="quoteNo"></div>
      <div><label>Date</label><input id="quoteDate" type="date"></div>
      <div><label>Customer Name</label><input id="customerName"></div>
      <div><label>Customer Phone</label><input id="customerPhone"></div>
    </div>
  </div>

  <div class="card"><img class="watermark" src="assets/logo.jpeg"><div class="sectionhead"><img src="assets/logo.jpeg"><h2 style="margin:0">Add Item</h2></div>
    <div class="chips" id="chips"></div>
    <div class="row g4" style="margin-top:12px">
      <div><label>Category</label><select id="category" onchange="changeCategory()"></select></div>
      <div><label>Type</label><input id="itemType"></div>
      <div><label>Unit</label><select id="unit"><option>m²</option><option>lm</option><option>each</option></select></div>
      <div><label>Quantity</label><input id="quantity" type="number" value="1" step="0.01"></div>
      <div><label>Base Rate</label><input id="baseRate" type="number" value="0" step="0.01"></div>
      <div><label>Colour Name</label><input id="colourName"></div>
      <div><label>Colour</label><input id="colourCode" type="color" value="#f5f5f5"></div>
      <div><label>Paint Brand</label><select id="paintBrand"><option>Dulux</option><option>Taubmans</option><option>Haymes</option><option>Wattyl</option></select></div>
    </div>
    <div style="margin-top:14px"><label>Category Samples</label><div class="gallery" id="gallery"></div></div>
    <div class="toolbar" style="margin-top:12px"><button class="ok" onclick="addItem()">Add Item</button><button class="ghost" onclick="clearItemForm()">Clear Item</button></div>
  </div>

  <div class="card"><img class="watermark" src="assets/logo.jpeg"><div class="sectionhead"><img src="assets/logo.jpeg"><h2 style="margin:0">Quote Items</h2></div><div id="items" class="items"></div></div>
</div>

<script>
const BASE_CATALOG = {"Doors": [{"type": "Flush Horizontal Groove Door", "rate": 150, "unit": "each", "img": "assets/door1.jpeg"}, {"type": "Five Panel Door", "rate": 170, "unit": "each", "img": "assets/door2.jpeg"}, {"type": "Two Panel Designer Door", "rate": 165, "unit": "each", "img": "assets/door3.jpeg"}, {"type": "Modern Line Detail Door", "rate": 180, "unit": "each", "img": "assets/door4.jpeg"}, {"type": "Plain Flush Door", "rate": 120, "unit": "each", "img": "assets/door5.jpeg"}, {"type": "Four Panel Door", "rate": 160, "unit": "each", "img": "assets/door6.jpeg"}], "Windows": [{"type": "Classic Timber Window", "rate": 145, "unit": "each", "img": "assets/window1.jpeg"}, {"type": "Double Hung Window", "rate": 135, "unit": "each", "img": "assets/window2.jpeg"}], "Ceilings": [{"type": "Flat Ceiling", "rate": 13, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}, {"type": "Tray Ceiling", "rate": 18, "unit": "m\u00b2", "img": "assets/ceiling-chart.jpeg"}], "Cornices": [{"type": "Standard Cornice", "rate": 14, "unit": "lm", "img": "assets/cornice1.svg"}, {"type": "Decorative Cornice", "rate": 18, "unit": "lm", "img": "assets/cornice2.svg"}], "Handrails": [{"type": "Simple Handrail", "rate": 35, "unit": "lm", "img": "assets/handrail1.svg"}, {"type": "Decorative Handrail", "rate": 55, "unit": "lm", "img": "assets/handrail2.svg"}], "Stairs": [{"type": "Standard Stair", "rate": 35, "unit": "each", "img": "assets/stairs1.svg"}, {"type": "Feature Stair", "rate": 55, "unit": "each", "img": "assets/stairs2.svg"}]};
let pendingCustomImage = '';
let state = {items:[], selectedSample:'', customCatalog: JSON.parse(localStorage.getItem('alwan_custom_catalog') || '{}')};

function $(id){ return document.getElementById(id); }
function money(n){ return '$' + (Number(n)||0).toFixed(2); }
function mergedCatalog(){
  const merged = JSON.parse(JSON.stringify(BASE_CATALOG));
  Object.keys(state.customCatalog).forEach(cat=>{
    if(!merged[cat]) merged[cat]=[];
    merged[cat] = merged[cat].concat(state.customCatalog[cat]);
  });
  return merged;
}
function saveCustomCatalog(){ localStorage.setItem('alwan_custom_catalog', JSON.stringify(state.customCatalog)); }

function init(){
  const cats = Object.keys(BASE_CATALOG);
  cats.forEach(name=>{
    const a=document.createElement('option'); a.value=name; a.textContent=name; $('category').appendChild(a);
    const b=document.createElement('option'); b.value=name; b.textContent=name; $('imgCategory').appendChild(b);
  });
  $('category').value='Doors';
  $('imgCategory').value='Doors';
  $('quoteDate').value=new Date().toISOString().slice(0,10);
  $('quoteNo').value='Q-'+Date.now().toString().slice(-6);
  renderChips(); renderGallery(); renderItems();
}
function renderChips(){
  const box=$('chips'); box.innerHTML='';
  Object.keys(mergedCatalog()).forEach(name=>{
    const chip=document.createElement('button');
    chip.type='button';
    chip.className='chip'+($('category').value===name?' active':'');
    chip.textContent=name;
    chip.onclick=()=>{$('category').value=name; changeCategory();};
    box.appendChild(chip);
  });
}
function changeCategory(){ $('itemType').value=''; state.selectedSample=''; renderChips(); renderGallery(); }
function renderGallery(){
  const list = mergedCatalog()[$('category').value] || [];
  const box = $('gallery'); box.innerHTML='';
  list.forEach((s,i)=>{
    const tile=document.createElement('div');
    tile.className='tile'+(state.selectedSample===s.img?' active':'');
    const del = s.custom ? `<button class="danger del" onclick="event.stopPropagation();deleteCustomSample('${$('category').value}','${s.id}')">Delete</button>` : '';
    tile.innerHTML = `${del}<img src="${s.img}"><div style="font-weight:800;margin-top:8px">${s.type}</div><div class="small">${money(s.rate)} / ${s.unit}</div>`;
    tile.onclick=()=>{ state.selectedSample=s.img; $('itemType').value=s.type; $('baseRate').value=s.rate; $('unit').value=s.unit; renderGallery(); };
    box.appendChild(tile);
    if(i===0 && !$('itemType').value){ state.selectedSample=s.img; $('itemType').value=s.type; $('baseRate').value=s.rate; $('unit').value=s.unit; }
  });
}
function storePendingImage(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader(); reader.onload=()=>pendingCustomImage=reader.result; reader.readAsDataURL(file);
}
function addCustomSample(){
  const cat=$('imgCategory').value, title=$('imgTitle').value.trim(), rate=Number($('imgRate').value||0), unit=$('imgUnit').value;
  if(!pendingCustomImage || !title){ alert('Upload image and enter title.'); return; }
  if(!state.customCatalog[cat]) state.customCatalog[cat]=[];
  state.customCatalog[cat].push({id:'c'+Date.now(), type:title, rate, unit, img:pendingCustomImage, custom:true});
  saveCustomCatalog();
  pendingCustomImage=''; $('imgTitle').value=''; $('imgRate').value='0'; $('imgUpload').value='';
  if($('category').value===cat) renderGallery();
  alert('Image added to '+cat);
}
function deleteCustomSample(cat,id){
  state.customCatalog[cat] = (state.customCatalog[cat]||[]).filter(x=>x.id!==id);
  saveCustomCatalog();
  renderGallery();
}
function addItem(){
  const qty=Number($('quantity').value||0), rate=Number($('baseRate').value||0), type=$('itemType').value.trim();
  if(!type||!qty){ alert('Choose item and quantity.'); return; }
  state.items.push({
    id:Date.now()+Math.random(),
    category:$('category').value,
    type:type,
    unit:$('unit').value,
    qty:qty,
    rate:rate,
    total:qty*rate,
    image:state.selectedSample || 'assets/logo.jpeg',
    paintBrand:$('paintBrand').value,
    colourName:$('colourName').value,
    colourCode:$('colourCode').value
  });
  renderItems(); clearItemForm();
}
function clearItemForm(){ $('quantity').value='1'; $('colourName').value=''; $('colourCode').value='#f5f5f5'; }
function renderItems(){
  const box=$('items'); box.innerHTML='';
  if(!state.items.length){ box.innerHTML='<div class="small">No items yet.</div>'; return; }
  state.items.forEach(item=>{
    const row=document.createElement('div');
    row.className='item';
    row.innerHTML=`<img src="${item.image}"><div><div style="font-weight:800">${item.type}</div><div class="small">${item.category} · ${item.qty} ${item.unit} × ${money(item.rate)}</div><div class="small"><span style="display:inline-block;width:14px;height:14px;background:${item.colourCode};border:1px solid #bbb;border-radius:999px;vertical-align:middle;margin-right:6px"></span>${item.paintBrand} ${item.colourName}</div></div><div><div style="font-weight:900">${money(item.total)}</div><button class="danger" style="margin-top:8px" onclick="removeItem(${item.id})">Delete</button></div>`;
    box.appendChild(row);
  });
}
function removeItem(id){ state.items = state.items.filter(x=>x.id!==id); renderItems(); }
function saveCustomer(){
  const customer={name:$('customerName').value, phone:$('customerPhone').value};
  localStorage.setItem('alwan_customer', JSON.stringify(customer));
  alert('Customer saved.');
}
function saveQuote(){
  localStorage.setItem('alwan_quote_last', JSON.stringify(state.items));
  alert('Quote saved.');
}
function exportData(){
  const payload = { customCatalog: state.customCatalog, items: state.items };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='alwan-backup.json'; a.click();
}
function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ try{ const data=JSON.parse(reader.result); if(data.customCatalog){ state.customCatalog=data.customCatalog; saveCustomCatalog(); } if(data.items){ state.items=data.items; renderItems(); } renderGallery(); alert('Backup imported.'); } catch(e){ alert('Invalid backup file.'); } };
  reader.readAsText(file);
}
function newQuote(){ location.reload(); }
init();
</script>
</body>
</html>
